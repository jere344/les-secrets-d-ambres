<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <style>
        .spin-slow { animation: spin-slow 24s linear infinite; transform-origin: center; }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .inner-glow { animation: pulse-glow 3s ease-in-out infinite alternate; }
        @keyframes pulse-glow { 0% { fill-opacity: 0.3; stroke-width: 1px; } 100% { fill-opacity: 0.8; stroke-width: 2.5px; filter: drop-shadow(0 0 8px #dbb56b); } }
    </style>
    <g class="spin-slow" stroke="#dbb56b" fill="none">
        <!-- Oriental geometric base -->
        <polygon points="50,5 60,35 95,35 70,55 80,90 50,70 20,90 30,55 5,35 40,35" stroke-width="1.5"/>
        <rect x="30" y="30" width="40" height="40" stroke-width="1.5" transform="rotate(45 50 50)"/>
        <rect x="30" y="30" width="40" height="40" stroke-width="1.5"/>
        
        <!-- Rose petal overlay (Bio/Nature touch) -->
        <path d="M50,15 C60,25 70,30 50,45 C30,30 40,25 50,15 Z" fill="rgba(219, 181, 107, 0.4)" stroke="none" transform="rotate(0 50 50)"/>
        <path d="M50,15 C60,25 70,30 50,45 C30,30 40,25 50,15 Z" fill="rgba(219, 181, 107, 0.4)" stroke="none" transform="rotate(90 50 50)"/>
        <path d="M50,15 C60,25 70,30 50,45 C30,30 40,25 50,15 Z" fill="rgba(219, 181, 107, 0.4)" stroke="none" transform="rotate(180 50 50)"/>
        <path d="M50,15 C60,25 70,30 50,45 C30,30 40,25 50,15 Z" fill="rgba(219, 181, 107, 0.4)" stroke="none" transform="rotate(270 50 50)"/>

        <!-- Honey/Amber center drop -->
        <circle class="inner-glow" cx="50" cy="50" r="10" fill="#cc8400" />
        <circle cx="50" cy="50" r="15" stroke-width="1" stroke-dasharray="2,2" />
        
        <!-- Aloe Vera leaf accents -->
        <path d="M50,60 C55,80 50,90 50,90 C50,90 45,80 50,60 Z" fill="#4d6141" stroke="none" transform="rotate(45 50 50)"/>
        <path d="M50,60 C55,80 50,90 50,90 C50,90 45,80 50,60 Z" fill="#4d6141" stroke="none" transform="rotate(135 50 50)"/>
        <path d="M50,60 C55,80 50,90 50,90 C50,90 45,80 50,60 Z" fill="#4d6141" stroke="none" transform="rotate(225 50 50)"/>
        <path d="M50,60 C55,80 50,90 50,90 C50,90 45,80 50,60 Z" fill="#4d6141" stroke="none" transform="rotate(315 50 50)"/>
    </g>
</svg>