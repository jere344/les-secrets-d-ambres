{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="page-hero reveal">
    <div class="container blog-detail-head">
        <a href="{% url 'blog_list' %}" class="back-link">&larr; Retour au journal</a>
        <p class="blog-date">{{ post.created_at|date:"d F Y" }}</p>
        <h1>{{ post.title }}</h1>
        <div class="blog-tags justify-center mb-2">
            {% for tag in post.tags.all %}
                <a href="{% url 'blog_list' %}?tag={{ tag.slug }}" class="blog-tag">#{{ tag.name }}</a>
            {% endfor %}
        </div>
    </div>
</section>

{% if post.image %}
<section class="section pt-0 reveal">
    <div class="container blog-hero-image">
        <img src="{{ post.image.url }}" alt="{{ post.title }}">
    </div>
</section>
{% endif %}

<section class="section reveal">
    <div class="container blog-content rich-text">
        {{ post.content|safe }}
    </div>
</section>
{% endblock %}
